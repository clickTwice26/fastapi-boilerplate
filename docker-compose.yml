services:
  api:
    build:
      context: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             gunicorn app.main:app -k uvicorn.workers.UvicornWorker
             --bind 0.0.0.0:8000 --workers 2 --access-logfile - --error-logfile -"

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_DB: fastapi_boilerplate
      POSTGRES_USER: fastapi
      POSTGRES_PASSWORD: fastapi_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fastapi -d fastapi_boilerplate"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
